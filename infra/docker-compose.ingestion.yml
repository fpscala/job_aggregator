services:
  ingestion:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: job-aggregator-ingestion
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?TELEGRAM_API_ID is required}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?TELEGRAM_API_HASH is required}
      TELEGRAM_SESSION: ${INGESTION_TELEGRAM_SESSION:-/app/runtime/job_aggregator.session}
      KAFKA_BOOTSTRAP_SERVERS: ${INGESTION_KAFKA_BOOTSTRAP_SERVERS:-kafka:19092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-jobs.raw}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-job-aggregator}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_LOG_LEVEL: ${KAFKA_LOG_LEVEL:-WARNING}
      PARSER_CONCURRENCY: ${PARSER_CONCURRENCY:-50}
      KAFKA_WORKER_COUNT: ${KAFKA_WORKER_COUNT:-4}
      KAFKA_QUEUE_SIZE: ${KAFKA_QUEUE_SIZE:-1000}
    volumes:
      - ../data/telegram-session:/app/runtime
