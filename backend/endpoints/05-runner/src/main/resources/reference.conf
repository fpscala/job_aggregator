http {
  port = 8000
  port = ${?HTTP_PORT}
  logger = {
    http-header = false
    http-header = ${?HTTP_HEADER_LOG}
    http-body = false
    http-body = ${?HTTP_BODY_LOG}
  }
}

api {
  default-limit = 50
  default-limit = ${?API_DEFAULT_LIMIT}
  max-limit = 100
  max-limit = ${?API_MAX_LIMIT}
}

jobs {
  jobs = ["uz.scala.jobs.TelegramChannelPublishJob"]
  run-on-bootstrap = true
  mode = forever
  cron-jobs = []
}

redis {
  uri = "redis://localhost:6379"
  prefix = "job_aggregator"
}

mailer {
  enabled = false
  enabled = ${?MAILER_ENABLED}
  host = "smtp.scala.uz"
  host = ${?MAILER_HOST}
  port = 587
  port = ${?MAILER_PORT}
  username = "noreply@scala.uz"
  username = ${?MAILER_USERNAME}
  password = changeme
  password = ${?MAILER_PASSWORD}
  from-address = "noreply@scala.uz"
  from-address = ${?MAILER_FROM_ADDRESS}
  from-name = "Uzbekistan Job Portal"
  from-name = ${?MAILER_FROM_NAME}
  recipients = []
  recipients = ${?MAILER_RECIPIENTS}
}

database {
  host = "127.0.0.1"
  host = ${?POSTGRES_HOST}
  port = 5432
  port = ${?POSTGRES_PORT}
  user = "postgres"
  user = ${?POSTGRES_USER}
  password = "postgres"
  password = ${?POSTGRES_PASSWORD}
  database = "jobs"
  database = ${?POSTGRES_DATABASE}
  enable-logging = true
  enable-logging = ${?POSTGRES_ENABLE_LOGGING}
}

kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}

  topics {
    raw-job = "jobs.raw"
    raw-job = ${?KAFKA_TOPIC_JOBS_RAW}
  }

  consumer {
    group-id = "telegram-job-platform-etl"
    group-id = ${?KAFKA_CONSUMER_GROUP_ID}
    client-id = "telegram-job-platform-etl"
    client-id = ${?KAFKA_CONSUMER_CLIENT_ID}
    auto-offset-reset = "earliest"
    auto-offset-reset = ${?KAFKA_CONSUMER_AUTO_OFFSET_RESET}
    max-poll-records = 100
    max-poll-records = ${?KAFKA_CONSUMER_MAX_POLL_RECORDS}
    session-timeout = 30.seconds
    session-timeout = ${?KAFKA_CONSUMER_SESSION_TIMEOUT}
    heartbeat-interval = 3.seconds
    heartbeat-interval = ${?KAFKA_CONSUMER_HEARTBEAT_INTERVAL}
  }

  producer {
    acks = "all"
    retries = 3
    batch-size = 16384
    linger-ms = 10
    buffer-memory = 33554432
    compression-type = "snappy"
  }

}

telegram {
  enabled = false
  enabled = ${?TELEGRAM_ENABLED}

  bot {
    token = ${?TELEGRAM_BOT_TOKEN}
    api-base-url = "https://api.telegram.org"
    api-base-url = ${?TELEGRAM_BOT_API_BASE_URL}
  }

  publish {
    enabled = false
    enabled = ${?TELEGRAM_PUBLISH_ENABLED}
    channel-chat-id = ${?TELEGRAM_PUBLISH_CHANNEL_CHAT_ID}
    batch-size = 10
    batch-size = ${?TELEGRAM_PUBLISH_BATCH_SIZE}
    banner-image-path = ${?TELEGRAM_PUBLISH_BANNER_IMAGE_PATH}
    footer-handle = ${?TELEGRAM_PUBLISH_FOOTER_HANDLE}
  }
}
